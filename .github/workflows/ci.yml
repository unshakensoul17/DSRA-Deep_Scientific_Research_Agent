name: DSRA V2 CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (Lint, Type-check, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-run-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtual environment
        uses: actions/cache@v4
        id: cache-poetry
        with:
          path: backend/.venv
          key: poetry-backend-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            poetry-backend-${{ runner.os }}-

      - name: Install Dependencies
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: poetry install --no-root

      - name: Run Ruff Lint Check
        run: poetry run ruff check app tests

      - name: Run Ruff Format Check
        run: poetry run ruff format --check app tests

      - name: Run Mypy Type Check
        run: poetry run mypy app

      - name: Run Pytest Suite with Coverage
        env:
          APP_SECRET_KEY: 12345678901234567890123456789012
          POSTGRES_PASSWORD: password123
          OPENAI_API_KEY: sk-12345678901234567890123456789012
          JWT_SECRET_KEY: 12345678901234567890123456789012
        run: poetry run pytest --cov=app --cov-report=xml tests

  frontend-ci:
    name: Frontend CI (Lint, Type-check, Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Compiler Check
        run: npx tsc --noEmit

      - name: Run Vite Build Check
        run: npm run build
