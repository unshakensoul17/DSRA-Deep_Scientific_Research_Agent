version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dsra_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dsra_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsra_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dsra_v2
      POSTGRES_PASSWORD: postgres
      APP_SECRET_KEY: 12345678901234567890123456789012
      JWT_SECRET_KEY: 12345678901234567890123456789012
      OPENAI_API_KEY: sk-placeholder-key-replace-in-production
    volumes:
      - shared_exports:/workspace/exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsra_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  shared_exports:
