version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dsra_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dsra_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsra_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8010:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dsra_v2
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_DEFAULT_MODEL: gemini-3.1-flash-lite
      GEMINI_FALLBACK_MODEL: gemini-1.5-flash
      GEMINI_REQUEST_TIMEOUT: 45
    volumes:
      - shared_exports:/workspace/exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsra_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  shared_exports:
